<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexAI | Professional Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --accent-color: #00d2ff;
            --bot-bg: rgba(255, 255, 255, 0.1);
            --user-bg: #4e54c8;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            background: var(--primary-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 450px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        /* Header section */
        .header {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header .status-dot {
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
        }

        .header h2 {
            margin: 0;
            font-size: 18px;
            color: var(--text-color);
            letter-spacing: 1px;
        }

        /* Chat area */
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }

        .message {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 80%;
            font-size: 14.5px;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        .user {
            background: var(--user-bg);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot {
            background: var(--bot-bg);
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Loading Dots */
        .typing {
            font-style: italic;
            font-size: 12px;
            color: var(--accent-color);
            margin-bottom: 10px;
            display: none;
        }

        /* Input area */
        .input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 18px;
            border-radius: 30px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .input-area input:focus {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.15);
        }

        .send-btn {
            background: var(--accent-color);
            color: #0f0c29;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--accent-color);
        }

        footer {
            padding: 10px;
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
        }

        /* Animations */
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <div class="status-dot"></div>
        <h2>NexAI Assistant</h2>
    </div>

    <div class="chat-box" id="chat-box">
        <div class="message bot">
            Hello! I'm NexAI. How can I assist you today?
        </div>
    </div>

    <div id="typing" class="typing" style="padding: 0 20px;">NexAI is thinking...</div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask anything..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>

    <footer>
        SECURE AI CONNECTION &bull; PARTH KANSURKAR
    </footer>
</div>

<script>
    const chatBox = document.getElementById("chat-box");
    const userInput = document.getElementById("user-input");
    const typingIndicator = document.getElementById("typing");

    // Enter key support
    userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // Add User Message
        appendMessage(text, 'user');
        userInput.value = "";
        
        // Show Typing
        typingIndicator.style.display = "block";
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch("/chat/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                    "X-CSRFToken": getCookie("csrftoken")
                },
                body: `message=${encodeURIComponent(text)}`
            });

            const data = await response.json();
            
            // Remove Typing and Add Bot Message
            typingIndicator.style.display = "none";
            appendMessage(data.response, 'bot');

        } catch (error) {
            typingIndicator.style.display = "none";
            appendMessage("Sorry, something went wrong. Please try again.", 'bot');
        }
    }

    function appendMessage(text, side) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${side}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== "") {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>

</body>
</html>
